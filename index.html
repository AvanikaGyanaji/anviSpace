<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/logos/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Anvi Space | Autonomous Robotics & Space Tech</title>
    <meta name="description" content="Anvi Space builds cutting-edge autonomous robotics and modular space technologies, from orbital systems to surface exploration.">
    <meta name="keywords" content="Anvi Space, space robotics, autonomous systems, rovers, orbit technology, aerospace, propulsion, modular robotics">
    <meta name="author" content="Anvi Space">

    <!-- Open Graph (Social Media Preview) -->
    <meta property="og:title" content="Anvi Space">
    <meta property="og:description" content="Innovating modular robotics, autonomous rovers, and propulsion systems for the future of space exploration.">
    <meta property="og:image" content="https://www.anvispace.com/logos/favicon.io">
    <meta property="og:url" content="https://www.anvispace.com">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Anvi Space">
    <meta name="twitter:description" content="Pioneering modular robotics and propulsion systems for orbital and surface operations.">
    <meta name="twitter:image" content="https://www.anvispace.com/logos/favicon.io">

    <!-- Robots (Search Indexing) -->
    <meta name="robots" content="index, follow">

    <!-- Fonts -->
    <link href="https://fonts.cdnfonts.com/css/shinko-sans" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Attachment for Title Script for Attracting Users -->
    <script>
    let originalTitle = document.title;
    let intervalId;
    let messages = [
      "🚀 We miss you!",
      "👋 Come back to Anvi Space!",
      "✨ Exploring the stars...",
      "🤖 Autonomous Robotics awaits!",
      "🌌 Your mission isn’t over!"
    ];

    window.addEventListener("blur", () => {
      let i = 0;
      intervalId = setInterval(() => {
        document.title = messages[i % messages.length];
        i++;
      }, 1200);
    });

    window.addEventListener("focus", () => {
      clearInterval(intervalId);
      document.title = originalTitle;
    });
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
